<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нет соединения — WAVECLUBMEDIA</title>
  <link rel="icon" href="https://raw.githubusercontent.com/mrgrayyooo/wcm/refs/heads/main/logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#b01030;
      --bg:#000;
      --txt:#fff;
      --sub:#666;
      --dim:#333;
      --px:3px; /* размер пикселя */
    }
    html,body{
      width:100%;height:100%;
      background:var(--bg);
      color:var(--txt);
      font-family:'Space Mono',monospace;
      overflow:hidden;
      user-select:none;
    }

    /* ── ФОНОВЫЕ ЛИНИИ ── */
    body::before{
      content:'';
      position:fixed;inset:0;
      background:repeating-linear-gradient(
        0deg,
        transparent,transparent 40px,
        rgba(255,255,255,.015) 40px,rgba(255,255,255,.015) 41px
      );
      pointer-events:none;
    }

    /* ── HEADER ── */
    .top-bar{
      position:fixed;top:0;left:0;right:0;
      padding:16px 24px;
      display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid #111;
      background:rgba(0,0,0,.9);
      backdrop-filter:blur(10px);
      z-index:10;
    }
    .top-logo{
      display:flex;align-items:center;gap:10px;
      font-family:'Sora',sans-serif;font-size:.75rem;font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;
    }
    .top-logo img{width:28px;height:28px;border-radius:50%;border:1px solid rgba(176,16,48,.5);}
    .no-signal{
      display:flex;align-items:center;gap:6px;
      font-size:.6rem;letter-spacing:.12em;color:var(--sub);
    }
    .no-signal-dot{
      width:6px;height:6px;border-radius:50%;background:var(--dim);
    }

    /* ── ОСНОВНАЯ ЗОНА ── */
    .game-wrap{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      height:100vh;
      padding:80px 24px 40px;
      gap:0;
    }

    /* ── СТАТУС / ЭКРАН СТАРТА ── */
    .status{
      text-align:center;
      margin-bottom:32px;
      min-height:80px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    }
    .status-title{
      font-family:'Sora',sans-serif;
      font-size:clamp(1.2rem,4vw,2rem);
      font-weight:800;letter-spacing:-.02em;
      line-height:1.1;
    }
    .status-title span{color:var(--red);}
    .status-sub{
      font-size:.65rem;letter-spacing:.14em;color:var(--sub);
      text-transform:uppercase;
    }
    .status-hint{
      font-size:.6rem;letter-spacing:.1em;color:#444;
      text-transform:uppercase;
      animation:blink 1.2s ease-in-out infinite;
      margin-top:4px;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ── SCORE ── */
    .scoreboard{
      display:flex;gap:32px;margin-bottom:16px;
    }
    .score-item{text-align:center;}
    .score-label{
      font-size:.55rem;letter-spacing:.16em;color:var(--sub);
      text-transform:uppercase;display:block;margin-bottom:3px;
    }
    .score-val{
      font-family:'Sora',sans-serif;font-size:1.4rem;font-weight:800;
      color:var(--txt);line-height:1;
    }
    .score-val.red{color:var(--red);}

    /* ── CANVAS ── */
    #gameCanvas{
      border:1px solid #1a1a1a;
      border-bottom:2px solid var(--red);
      image-rendering:pixelated;
      image-rendering:crisp-edges;
      background:#000;
      display:block;
    }

    /* ── CONTROLS ── */
    .controls{
      display:flex;gap:12px;margin-top:20px;
    }
    .ctrl-btn{
      padding:10px 24px;
      background:transparent;
      border:1px solid #2a2a2a;
      color:var(--sub);
      font-family:'Space Mono',monospace;
      font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;
      border-radius:4px;cursor:pointer;
      transition:.2s;
    }
    .ctrl-btn:hover,.ctrl-btn.primary{
      border-color:var(--red);color:var(--red);
    }
    .ctrl-btn.primary{
      background:rgba(176,16,48,.08);
    }

    /* ── МОБИЛЬНАЯ КНОПКА ПРЫЖКА ── */
    .mobile-jump{
      position:fixed;bottom:32px;right:32px;
      width:64px;height:64px;
      background:rgba(176,16,48,.12);
      border:1px solid rgba(176,16,48,.4);
      border-radius:50%;
      display:none;
      align-items:center;justify-content:center;
      font-size:1.4rem;
      cursor:pointer;
      transition:.2s;
      z-index:20;
    }
    .mobile-jump:active{background:rgba(176,16,48,.3);}
    @media(pointer:coarse){.mobile-jump{display:flex;}}

    /* ── FOOTER ── */
    .game-footer{
      position:fixed;bottom:16px;left:0;right:0;
      text-align:center;
      font-size:.55rem;letter-spacing:.12em;color:#222;
      text-transform:uppercase;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-logo">
    <img src="https://raw.githubusercontent.com/mrgrayyooo/wcm/refs/heads/main/logo.png" alt="WCM">
    WAVECLUBMEDIA
  </div>
  <div class="no-signal">
    <div class="no-signal-dot"></div>
    нет соединения
  </div>
</div>

<div class="game-wrap">

  <div class="status" id="status">
    <div class="status-title">НЕТ <span>СИГНАЛА</span></div>
    <div class="status-sub">Пока нет интернета — поиграй</div>
    <div class="status-hint">Пробел / тап — прыжок</div>
  </div>

  <div class="scoreboard">
    <div class="score-item">
      <span class="score-label">Счёт</span>
      <div class="score-val red" id="scoreVal">0</div>
    </div>
    <div class="score-item">
      <span class="score-label">Рекорд</span>
      <div class="score-val" id="hiVal">0</div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn">Начать игру</button>
    <button class="ctrl-btn" id="backBtn" onclick="window.location.href='index.html'">← На сайт</button>
  </div>

</div>

<button class="mobile-jump" id="mobileJump" aria-label="Прыжок">↑</button>

<div class="game-footer">WAVECLUBMEDIA — Music Brand · Studio · Label · Radio</div>

<script>
(function(){
  'use strict';

  /* ── CANVAS SETUP ── */
  var canvas  = document.getElementById('gameCanvas');
  var ctx     = canvas.getContext('2d');
  var W, H;

  function resize(){
    var maxW = Math.min(window.innerWidth - 48, 700);
    W = canvas.width  = maxW;
    H = canvas.height = Math.round(maxW * 0.28);
    if(H < 120) H = canvas.height = 120;
    if(H > 200) H = canvas.height = 200;
  }
  resize();
  window.addEventListener('resize', function(){ resize(); if(!running) drawIdle(); });

  /* ── ПИКСЕЛЬ-МАСШТАБ ── */
  function px(n){ return Math.max(1, Math.round(n * (W/700))); }

  /* ── ЦВЕТА ── */
  var C = {
    bg:      '#000000',
    ground:  '#b01030',
    ground2: '#7a0020',
    raper:   '#ffffff',
    raper2:  '#aaaaaa',
    raper3:  '#b01030',
    cap:     '#b01030',
    cap2:    '#7a0020',
    star:    '#333333',
    score:   '#b01030',
  };

  /* ── СОСТОЯНИЕ ── */
  var GROUND_Y;
  var running  = false;
  var dead     = false;
  var started  = false;
  var score    = 0;
  var hiscore  = +localStorage.getItem('wcm_hiscore') || 0;
  var speed    = 0;
  var frame    = 0;
  var raf;

  /* ── ИГРОК ── */
  var player = {
    x:0, y:0, w:0, h:0,
    vy:0, onGround:true,
    legFrame:0, legTimer:0
  };

  /* ── ПРЕПЯТСТВИЯ (ДАБЛ КЭПЫ) ── */
  var obstacles = [];
  var obTimer   = 0;
  var obInterval= 0;

  /* ── ЧАСТИЦЫ ── */
  var particles = [];

  /* ── ЗВЁЗДЫ ── */
  var stars = [];
  function initStars(){
    stars = [];
    for(var i=0;i<30;i++){
      stars.push({ x:Math.random()*W, y:Math.random()*(H-px(20)), s:Math.random()>0.7?2:1 });
    }
  }

  /* ── ИНИЦИАЛИЗАЦИЯ ── */
  function init(){
    GROUND_Y = H - px(20);
    player.w  = px(14);
    player.h  = px(20);
    player.x  = px(60);
    player.y  = GROUND_Y - player.h;
    player.vy = 0;
    player.onGround = true;
    player.legFrame = 0;
    obstacles  = [];
    particles  = [];
    score      = 0;
    speed      = px(3.5);
    obTimer    = 0;
    obInterval = randomInterval();
    frame      = 0;
    initStars();
    updateUI();
  }

  function randomInterval(){
    return 80 + Math.floor(Math.random()*60);
  }

  /* ── ПРЫЖОК ── */
  function jump(){
    if(!started){ startGame(); return; }
    if(dead){ restartGame(); return; }
    if(player.onGround){
      player.vy = -px(20);
      player.onGround = false;
      spawnJumpParticles();
    }
  }

  /* ── ЧАСТИЦЫ ПРИ ПРЫЖКЕ ── */
  function spawnJumpParticles(){
    for(var i=0;i<6;i++){
      particles.push({
        x: player.x + player.w/2,
        y: player.y + player.h,
        vx: (Math.random()-0.5)*px(2),
        vy: Math.random()*px(1.5),
        life: 18,
        maxLife: 18,
        size: px(2)
      });
    }
  }

  /* ── СПАВН ПРЕПЯТСТВИЯ ── */
  function spawnObstacle(){
    /* Дабл кэп — две кепки одна над другой */
    var capW  = px(12);
    var capH1 = px(8);   /* тулья */
    var capH2 = px(4);   /* козырёк */
    var totalH = px(22);

    /* Иногда две кепки рядом с небольшим зазором */
    var double = score > 300 && Math.random() > 0.6;

    obstacles.push({
      x:   W + px(10),
      y:   GROUND_Y - totalH,
      w:   double ? capW*2 + px(6) : capW,
      h:   totalH,
      capW: capW,
      capH1: capH1,
      capH2: capH2,
      double: double
    });
  }

  /* ── РИСУЕМ РЕПЕРА ── */
  function drawPlayer(){
    var p  = player;
    var x  = Math.round(p.x);
    var y  = Math.round(p.y);
    var w  = p.w;
    var h  = p.h;
    var lf = p.legFrame;

    /* Тело */
    ctx.fillStyle = C.raper;
    ctx.fillRect(x, y + px(6), w, px(10));

    /* Голова */
    ctx.fillStyle = C.raper;
    ctx.fillRect(x + px(1), y, w - px(2), px(7));

    /* Лицо — тёмный прямоугольник */
    ctx.fillStyle = C.bg;
    ctx.fillRect(x + px(2), y + px(1), w - px(5), px(4));

    /* Глаза — красные точки */
    ctx.fillStyle = C.raper3;
    ctx.fillRect(x + px(3), y + px(2), px(2), px(2));

    /* Кепка */
    ctx.fillStyle = C.cap;
    ctx.fillRect(x - px(1), y - px(4), w + px(2), px(4));  /* тулья */
    ctx.fillRect(x - px(3), y - px(1), w + px(5), px(2));  /* козырёк */
    ctx.fillStyle = C.cap2;
    ctx.fillRect(x + px(2), y - px(4), px(3), px(4));      /* полоса */

    /* Ноги */
    ctx.fillStyle = C.raper2;
    if(p.onGround){
      if(lf === 0){
        ctx.fillRect(x + px(1),  y + px(16), px(4), px(4));
        ctx.fillRect(x + px(7),  y + px(14), px(4), px(6));
      } else if(lf === 1){
        ctx.fillRect(x + px(1),  y + px(14), px(4), px(6));
        ctx.fillRect(x + px(7),  y + px(16), px(4), px(4));
      } else {
        ctx.fillRect(x + px(1),  y + px(15), px(4), px(5));
        ctx.fillRect(x + px(7),  y + px(15), px(4), px(5));
      }
    } else {
      /* В воздухе — ноги немного согнуты */
      ctx.fillRect(x + px(1),  y + px(15), px(4), px(3));
      ctx.fillRect(x + px(7),  y + px(13), px(4), px(5));
    }

    /* Руки */
    ctx.fillStyle = C.raper;
    if(p.onGround && lf !== 2){
      ctx.fillRect(x - px(3), y + px(7),  px(3), px(4));
      ctx.fillRect(x + w,     y + px(8),  px(3), px(4));
    } else {
      ctx.fillRect(x - px(3), y + px(6),  px(3), px(5));
      ctx.fillRect(x + w,     y + px(6),  px(3), px(5));
    }
  }

  /* ── РИСУЕМ ДАБЛ КЭП ── */
  function drawCap(ob){
    /* Одна кепка */
    function singleCap(cx, cy, cw, ch1, ch2){
      /* Тулья */
      ctx.fillStyle = C.cap;
      ctx.fillRect(cx, cy, cw, ch1);
      /* Полоса сбоку */
      ctx.fillStyle = C.cap2;
      ctx.fillRect(cx + px(2), cy, px(3), ch1);
      /* Козырёк снизу */
      ctx.fillStyle = C.cap;
      ctx.fillRect(cx - px(2), cy + ch1, cw + px(4), ch2);
      /* Блик */
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(cx + cw - px(3), cy, px(2), px(3));
    }

    var cw = ob.capW;

    if(ob.double){
      singleCap(ob.x,          ob.y, cw, ob.capH1, ob.capH2);
      singleCap(ob.x + cw + px(6), ob.y, cw, ob.capH1, ob.capH2);
      /* Надпись WCM между */
      ctx.fillStyle = 'rgba(176,16,48,.6)';
      ctx.font = 'bold ' + px(6) + 'px Space Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('WCM', ob.x + cw + px(3), ob.y - px(3));
    } else {
      singleCap(ob.x, ob.y, cw, ob.capH1, ob.capH2);
    }
  }

  /* ── ЗЕМЛЯ ── */
  function drawGround(){
    ctx.fillStyle = C.ground;
    ctx.fillRect(0, GROUND_Y, W, px(3));
    ctx.fillStyle = C.ground2;
    ctx.fillRect(0, GROUND_Y + px(3), W, px(2));

    /* Пунктир разметки */
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    var dashW = px(12), dashH = px(1), gapX = px(20);
    for(var dx = (frame*px(2)) % (dashW+gapX); dx < W; dx += dashW+gapX){
      ctx.fillRect(dx, GROUND_Y + px(1), dashW, dashH);
    }
  }

  /* ── ЗВЁЗДЫ ── */
  function drawStars(){
    ctx.fillStyle = C.star;
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      ctx.fillRect(Math.round(s.x), Math.round(s.y), s.s, s.s);
    }
  }

  /* ── ЧАСТИЦЫ ── */
  function drawParticles(){
    for(var i=particles.length-1;i>=0;i--){
      var p=particles[i];
      var alpha = p.life/p.maxLife;
      ctx.fillStyle = 'rgba(176,16,48,'+alpha+')';
      ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += px(0.2);
      p.life--;
      if(p.life<=0) particles.splice(i,1);
    }
  }

  /* ── СЦЕНА В ПОКОЕ ── */
  function drawIdle(){
    GROUND_Y = H - px(20);
    ctx.clearRect(0,0,W,H);
    drawStars();
    drawGround();
    /* Репер стоит */
    player.y = GROUND_Y - player.h;
    player.legFrame = 2;
    drawPlayer();
  }

  /* ── ГЛАВНЫЙ ИГРОВОЙ ЦИКЛ ── */
  function loop(){
    if(!running) return;
    frame++;
    ctx.clearRect(0,0,W,H);

    /* Звёзды */
    drawStars();

    /* Земля */
    drawGround();

    /* Гравитация */
    player.vy += px(0.55);
    player.y  += player.vy;

    if(player.y >= GROUND_Y - player.h){
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
    } else {
      player.onGround = false;
    }

    /* Анимация ног */
    if(player.onGround){
      player.legTimer++;
      if(player.legTimer > 8){
        player.legTimer = 0;
        player.legFrame = (player.legFrame + 1) % 2;
      }
    }

    /* Препятствия */
    obTimer++;
    if(obTimer >= obInterval){
      spawnObstacle();
      obTimer = 0;
      obInterval = randomInterval();
      /* Ускоряем */
      speed = Math.min(px(8), speed + px(0.15));
    }

    for(var i=obstacles.length-1;i>=0;i--){
      var ob = obstacles[i];
      ob.x -= speed;
      drawCap(ob);

      /* Коллизия — чуть прощающая */
      var margin = px(3);
      if(
        player.x + player.w - margin > ob.x + margin &&
        player.x + margin < ob.x + ob.w - margin &&
        player.y + player.h - margin > ob.y + margin
      ){
        gameover();
        return;
      }

      if(ob.x + ob.w < 0) obstacles.splice(i,1);
    }

    /* Частицы */
    drawParticles();

    /* Игрок */
    drawPlayer();

    /* Счёт */
    score++;
    if(score % 5 === 0) updateUI();

    raf = requestAnimationFrame(loop);
  }

  /* ── ИГРА ОКОНЧЕНА ── */
  function gameover(){
    running = false;
    dead    = true;

    if(score > hiscore){
      hiscore = score;
      localStorage.setItem('wcm_hiscore', hiscore);
    }
    updateUI();

    /* Красный флэш */
    var flashes = 0;
    var flashTimer = setInterval(function(){
      ctx.fillStyle = 'rgba(176,16,48,' + (flashes%2===0?'.18':'0') + ')';
      ctx.fillRect(0,0,W,H);
      flashes++;
      if(flashes > 5) clearInterval(flashTimer);
    }, 80);

    /* Обновляем статус */
    var statusEl = document.getElementById('status');
    statusEl.innerHTML =
      '<div class="status-title">GAME <span>OVER</span></div>' +
      '<div class="status-sub">Счёт: ' + score + (score===hiscore?' — новый рекорд 🔥':'') + '</div>' +
      '<div class="status-hint">Пробел / тап — играть снова</div>';

    document.getElementById('startBtn').textContent = 'Играть снова';
  }

  /* ── ОБНОВИТЬ UI ── */
  function updateUI(){
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('hiVal').textContent = hiscore;
  }

  /* ── СТАРТ / РЕСТАРТ ── */
  function startGame(){
    started = true;
    dead    = false;
    init();
    running = true;
    var statusEl = document.getElementById('status');
    statusEl.innerHTML =
      '<div class="status-sub" style="font-size:.62rem;letter-spacing:.1em;color:#444;text-transform:uppercase;">Прыгай через дабл кэпы</div>';
    document.getElementById('startBtn').textContent = 'Заново';
    loop();
  }

  function restartGame(){
    cancelAnimationFrame(raf);
    startGame();
  }

  /* ── УПРАВЛЕНИЕ ── */
  document.addEventListener('keydown', function(e){
    if(e.code === 'Space' || e.code === 'ArrowUp'){
      e.preventDefault();
      jump();
    }
  });

  document.getElementById('gameCanvas').addEventListener('click', jump);
  document.getElementById('mobileJump').addEventListener('click', jump);
  document.getElementById('startBtn').addEventListener('click', function(){
    if(!started || dead) startGame(); else restartGame();
  });

  /* Touch на всём экране */
  document.addEventListener('touchstart', function(e){
    if(e.target.id === 'backBtn') return;
    e.preventDefault();
    jump();
  }, {passive:false});

  /* ── ПЕРВАЯ ОТРИСОВКА ── */
  init();
  drawIdle();
  updateUI();

})();
</script>
</body>
</html>
